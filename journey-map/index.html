<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Virtue Expedition — Journey Map</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <style>
    /* Transparent body so the widget blends into Canvas */
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: var(--font-sans);
      color: var(--text-dark);
      overflow: hidden;
    }

    .map-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--cream-light) 85%);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 1px 3px rgba(65, 36, 2, 0.05);
    }

    .map-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .title-banner {
      position: absolute;
      top: 14px;
      left: 20px;
      color: var(--amber-dark);
    }
    .title-banner .title {
      font-family: var(--font-serif);
      font-size: 15px;
      font-style: italic;
      margin: 0;
      line-height: 1;
    }
    .title-banner .sub {
      font-size: 10px;
      font-weight: 700;
      color: var(--amber-primary);
      margin: 4px 0 0;
      letter-spacing: 0.15em;
    }

    .progress-hint {
      text-align: center;
      font-family: var(--font-serif);
      font-size: 13px;
      font-style: italic;
      color: var(--amber-dark);
      margin: 0;
      padding: 0 20px 16px;
      opacity: 0.85;
    }

    /* Landmark state styles (applied via JS) */
    .landmark.completed .landmark-art {
      /* Completed virtues keep full color */
    }
    .landmark.current .landmark-art {
      /* Current virtue gets a subtle glow via filter */
      filter: drop-shadow(0 0 8px rgba(247, 169, 40, 0.55));
    }
    .landmark.future .landmark-art {
      opacity: 0.45;
      filter: saturate(0.5);
    }

    .label-pill text {
      font-weight: 700;
      font-size: 12px;
      stroke: none;
    }
    .label-pill.completed rect {
      fill: var(--amber-primary);
      stroke: var(--amber-dark);
      stroke-width: 1;
    }
    .label-pill.completed .label-text {
      fill: #FFFFFF;
    }
    .label-pill.current rect {
      fill: #FFFFFF;
      stroke: var(--amber-primary);
      stroke-width: 2.5;
    }
    .label-pill.current .label-text {
      fill: var(--amber-dark);
    }
    .label-pill.future rect {
      fill: #FFFFFF;
      stroke: var(--amber-dark);
      stroke-width: 1.5;
    }
    .label-pill.future .label-text {
      fill: var(--text-dark);
    }

    .progress-flag {
      transform-origin: bottom center;
      animation: wave 3s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-3deg); }
    }

    @media (max-width: 700px) {
      .title-banner .title { font-size: 13px; }
      .title-banner .sub { font-size: 9px; }
      .you-are-here { font-size: 10px; padding: 4px 10px; }
    }

    @media (max-width: 520px) {
      .title-banner .sub { display: none; }
      .title-banner .title { font-size: 12px; }
      .you-are-here { font-size: 9px; padding: 3px 9px; top: 12px; right: 12px; }
      .progress-hint { font-size: 11px; padding: 0 12px 12px; }
    }
  </style>
</head>

  <script>
    // =========================================================
    // Journey Map — URL-parameterized state logic
    // =========================================================
    // Accepts:
    //   ?current=courage                 (active virtue)
    //   ?completed=courage,honesty       (earned virtues, comma-sep)
    //   ?grade=4                         (for future grade variants)
    //   ?showBadge=false                 (hide the "you are here" pill)
    //
    // Landmark state is one of: completed | current | future
    // =========================================================

    const VIRTUES = [
      { key: 'courage',        label: 'Courage',        numeral: 'I' },
      { key: 'honesty',        label: 'Honesty',        numeral: 'II' },
      { key: 'responsibility', label: 'Responsibility', numeral: 'III' },
      { key: 'courtesy',       label: 'Courtesy',       numeral: 'IV' },
      { key: 'service',        label: 'Service',        numeral: 'V' },
      { key: 'perseverance',   label: 'Perseverance',   numeral: 'VI' },
      { key: 'selfgovt',       label: 'Self-Government',numeral: 'VII' },
    ];

    // Aliases so teachers can pass ?current=self-government or ?current=self-govt etc.
    const KEY_ALIASES = {
      'self-government': 'selfgovt',
      'selfgovernment': 'selfgovt',
      'self-govt': 'selfgovt',
      'self_govt': 'selfgovt',
    };

    function normalizeKey(k) {
      if (!k) return null;
      const lower = k.trim().toLowerCase();
      return KEY_ALIASES[lower] || lower;
    }

    function getParams() {
      const p = new URLSearchParams(window.location.search);
      const current = normalizeKey(p.get('current')) || 'courage';
      const completedRaw = p.get('completed') || '';
      const completed = completedRaw
        .split(',')
        .map(s => normalizeKey(s))
        .filter(Boolean);
      const grade = p.get('grade') || '4';
      return { current, completed, grade };
    }

    function stateFor(virtueKey, current, completed) {
      if (completed.includes(virtueKey)) return 'completed';
      if (virtueKey === current) return 'current';
      return 'future';
    }

    function applyState() {
      const { current, completed, grade } = getParams();

      // Update grade label
      const gradeWord = { '3': 'THREE', '4': 'FOUR', '5': 'FIVE' }[grade] || 'FOUR';
      document.getElementById('grade-label').textContent = `GRADE ${gradeWord} · YEAR-LONG JOURNEY`;

      // Apply state to every virtue
      VIRTUES.forEach(v => {
        const state = stateFor(v.key, current, completed);

        // Landmark group
        const landmark = document.getElementById(`landmark-${v.key}`);
        if (landmark) {
          landmark.classList.remove('completed', 'current', 'future');
          landmark.classList.add(state);

          // Show/hide the progress marker and completion mark
          const marker = landmark.querySelector('.progress-marker');
          const completion = landmark.querySelector('.completion-mark');
          if (marker) marker.style.display = (state === 'current') ? 'block' : 'none';
          if (completion) completion.style.display = (state === 'completed') ? 'block' : 'none';
        }

        // Label pill
        const pill = document.getElementById(`label-${v.key}`);
        if (pill) {
          pill.classList.remove('completed', 'current', 'future');
          pill.classList.add(state);
        }
      });

      // Update the progress hint
      const doneCount = completed.length;
      const currentVirtue = VIRTUES.find(v => v.key === current);
      const currentLabel = currentVirtue ? currentVirtue.label : 'Courage';
      const hint = document.getElementById('progress-hint');

      if (doneCount === 0) {
        hint.textContent = `Your journey has begun — the lantern of ${currentLabel} is lit ahead.`;
      } else if (doneCount === 7) {
        hint.textContent = `All seven virtues earned. The expedition is complete.`;
      } else if (doneCount === 6) {
        hint.textContent = `Six seals earned. One landmark remains.`;
      } else {
        hint.textContent = `${doneCount} of 7 earned — you are traveling through ${currentLabel}.`;
      }
    }

    // Run on load
    applyState();

    // Notify parent frame of our rendered height (optional, for iframe auto-resize)
    function reportHeight() {
      const height = document.body.scrollHeight;
      try {
        window.parent.postMessage({ type: 'virtue-map-height', height }, '*');
      } catch (e) { /* same-origin fine */ }
    }
    window.addEventListener('load', reportHeight);
    window.addEventListener('resize', reportHeight);
  </script>
</body>
</html>
