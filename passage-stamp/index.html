<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passage Stamp — The Virtue Expedition</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <script src="../shared/virtues.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: var(--font-sans);
      color: var(--text-dark);
      overflow: hidden;
    }

    .stamp-panel {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      background: linear-gradient(135deg, #FFE4C7 0%, #F7A928 50%, #E07A3C 100%);
      border-radius: 20px;
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
    }

    /* Starburst SVG sits behind content */
    .starburst {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 520px;
      opacity: 0.2;
      pointer-events: none;
    }

    .content-row {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 22px;
      align-items: center;
    }

    .seal-container {
      flex: 0 0 auto;
      position: relative;
      width: 120px;
      height: 120px;
    }

    .seal-svg {
      width: 100%;
      height: 100%;
      animation: sealEntrance 0.9s ease-out both;
    }

    .seal-svg .glow-ring {
      transform-origin: center;
      animation: glowPulse 2.8s ease-in-out infinite;
    }

    @keyframes sealEntrance {
      0%   { transform: scale(0.55) rotate(-14deg); opacity: 0; }
      60%  { transform: scale(1.08) rotate(2deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50%      { opacity: 0.7; transform: scale(1.08); }
    }

    .copy {
      flex: 1;
      min-width: 0;
    }

    .eyebrow {
      font-size: 11px;
      color: var(--amber-dark);
      margin: 0 0 5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 800;
      animation: fadeSlide 0.9s ease-out 0.25s both;
    }

    .headline {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 500;
      color: var(--text-dark);
      margin: 0 0 8px;
      line-height: 1.15;
      animation: fadeSlide 0.9s ease-out 0.35s both;
    }

    .subline {
      font-family: var(--font-serif);
      font-size: 15px;
      font-style: italic;
      color: var(--amber-deep);
      margin: 0;
      line-height: 1.5;
      animation: fadeSlide 0.9s ease-out 0.45s both;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 600px) {
      .content-row { gap: 16px; }
      .seal-container { width: 90px; height: 90px; }
      .headline { font-size: 20px; }
      .subline { font-size: 13px; }
      .stamp-panel { padding: 18px 20px; }
      .starburst { width: 400px; height: 400px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .seal-svg, .eyebrow, .headline, .subline {
        animation: none !important;
      }
      .seal-svg .glow-ring { animation: none !important; opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="stamp-panel">
    <!-- Starburst rays -->
    <svg class="starburst" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#FFFFFF" stroke-width="0.4" fill="none">
        <line x1="50" y1="0" x2="50" y2="100"/>
        <line x1="0" y1="50" x2="100" y2="50"/>
        <line x1="14" y1="14" x2="86" y2="86"/>
        <line x1="86" y1="14" x2="14" y2="86"/>
        <line x1="50" y1="0" x2="25" y2="100"/>
        <line x1="50" y1="0" x2="75" y2="100"/>
        <line x1="0" y1="50" x2="100" y2="25"/>
        <line x1="0" y1="50" x2="100" y2="75"/>
        <line x1="50" y1="0" x2="8" y2="92"/>
        <line x1="50" y1="0" x2="92" y2="92"/>
        <line x1="0" y1="50" x2="85" y2="8"/>
        <line x1="0" y1="50" x2="85" y2="92"/>
      </g>
    </svg>

    <div class="content-row">
      <div class="seal-container">
        <svg class="seal-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <!-- Pulsing glow ring behind -->
          <circle class="glow-ring" cx="60" cy="60" r="56" fill="#FFFFFF" opacity="0.5"/>
          <!-- Main seal disk -->
          <circle cx="60" cy="60" r="48" fill="#FFFFFF" stroke="#854F0B" stroke-width="2.5"/>
          <!-- Inner dashed ring -->
          <circle cx="60" cy="60" r="38" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="2 3"/>
          <!-- Star on top -->
          <path d="M 60,34 L 63,41 L 70,41 L 64.5,46 L 66.5,53 L 60,49 L 53.5,53 L 55.5,46 L 50,41 L 57,41 Z"
                fill="#F7A928" stroke="#854F0B" stroke-width="0.75" stroke-linejoin="round"/>
          <!-- "passage" text -->
          <text x="60" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#854F0B" font-style="italic">passage</text>
          <!-- Roman numeral (dynamic) -->
          <text id="numeral" x="60" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#412402" font-weight="500">I</text>
        </svg>
      </div>

      <div class="copy">
        <p class="eyebrow" id="eyebrow">Station Complete</p>
        <h3 class="headline" id="headline">Your first passage stamp is earned!</h3>
        <p class="subline" id="subline">Six more stations and the Seal of Courage awaits. Onward, scholar.</p>
      </div>
    </div>
  </div>

  <script>
    // =========================================================
    // Passage Stamp — URL-parameterized
    // =========================================================
    // Accepts:
    //   ?virtue=courage    which virtue is being earned (default courage)
    //   ?station=1         which station 1-7 (default 1)
    // =========================================================

    const P = new URLSearchParams(window.location.search);
    const virtueKey = window.VIRTUE_EXPEDITION.normalizeVirtueKey(P.get('virtue')) || 'courage';
    const stationNum = parseInt(P.get('station'), 10) || 1;

    const virtue = window.VIRTUE_EXPEDITION.virtues[virtueKey]
                 || window.VIRTUE_EXPEDITION.virtues.courage;
    const station = window.VIRTUE_EXPEDITION.stations[stationNum]
                  || window.VIRTUE_EXPEDITION.stations[1];

    // Ordinals and cardinals spelled out (formal register)
    const ORDINALS = ['', 'first', 'second', 'third', 'fourth', 'fifth', 'sixth', 'seventh'];
    const CARDINALS = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven'];
    const remaining = 7 - stationNum;

    // Set Roman numeral on seal
    document.getElementById('numeral').textContent = station.numeral;

    // Set headline
    const headlineText = stationNum === 7
      ? `You have earned the Seal of ${virtue.label}!`
      : `Your ${ORDINALS[stationNum]} passage stamp is earned!`;
    document.getElementById('headline').textContent = headlineText;

    // Set subline
    let sublineText;
    if (stationNum === 7) {
      sublineText = `All seven stations complete. The full Seal of ${virtue.label} is yours.`;
    } else if (remaining === 1) {
      sublineText = `One more station and the Seal of ${virtue.label} awaits. Onward, scholar.`;
    } else {
      // Capitalize first word
      const word = CARDINALS[remaining].charAt(0).toUpperCase() + CARDINALS[remaining].slice(1);
      sublineText = `${word} more stations and the Seal of ${virtue.label} awaits. Onward, scholar.`;
    }
    document.getElementById('subline').textContent = sublineText;

    // Report height to parent frame
    function reportHeight() {
      try {
        window.parent.postMessage({
          type: 'virtue-widget-height',
          widget: 'passage-stamp',
          height: document.body.scrollHeight
        }, '*');
      } catch (e) {}
    }
    window.addEventListener('load', reportHeight);
    window.addEventListener('resize', reportHeight);
  </script>
</body>
</html>
